apiVersion: v2
name: synaxis-staging
description: Synaxis Staging Environment Helm Chart
type: application
version: 1.0.0
appVersion: "1.0.0"
keywords:
  - synaxis
  - staging
  - kubernetes
  - microservices
home: https://github.com/rudironsoni/Synaxis
sources:
  - https://github.com/rudironsoni/Synaxis
maintainers:
  - name: Synaxis Team
    email: team@synaxis.io
dependencies:
  - name: postgresql
    version: 13.2.24
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled
  - name: redis
    version: 18.6.1
    repository: https://charts.bitnami.com/bitnami
    condition: redis.enabled
  - name: prometheus
    version: 25.8.2
    repository: https://prometheus-community.github.io/helm-charts
    condition: prometheus.enabled
  - name: grafana
    version: 7.0.19
    repository: https://grafana.github.io/helm-charts
    condition: grafana.enabled
  - name: loki
    version: 5.41.4
    repository: https://grafana.github.io/helm-charts
    condition: loki.enabled
  - name: istio-base
    version: 1.20.0
    repository: https://istio-release.storage.googleapis.com/charts
    condition: istio.enabled
  - name: istiod
    version: 1.20.0
    repository: https://istio-release.storage.googleapis.com/charts
    condition: istio.enabled
  - name: ingress-nginx
    version: 4.8.3
    repository: https://kubernetes.github.io/ingress-nginx
    condition: ingress.enabled
