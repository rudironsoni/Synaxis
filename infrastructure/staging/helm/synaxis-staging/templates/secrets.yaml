{{- /* Synaxis Staging Secrets Template */ -}}
apiVersion: v1
kind: Secret
metadata:
  name: synaxis-db-credentials
  namespace: {{ .Values.namespace.name }}
  labels:
    app: synaxis-staging
    component: database
type: Opaque
stringData:
  POSTGRES_HOST: "synaxis-staging-postgresql"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "synaxis_staging"
  POSTGRES_USER: "synaxis_staging_user"
  POSTGRES_PASSWORD: "{{ randAlphaNum 32 }}"  # Auto-generated secure password
  ConnectionStrings__DefaultConnection: "Host=synaxis-staging-postgresql;Database=synaxis_staging;Username=synaxis_staging_user;Password={{ randAlphaNum 32 }}"
---
apiVersion: v1
kind: Secret
metadata:
  name: synaxis-redis-credentials
  namespace: {{ .Values.namespace.name }}
  labels:
    app: synaxis-staging
    component: cache
type: Opaque
stringData:
  redis-password: "{{ randAlphaNum 32 }}"
  ConnectionStrings__Redis: "synaxis-staging-redis-master:6379,password={{ randAlphaNum 32 }},abortConnect=false"
---
apiVersion: v1
kind: Secret
metadata:
  name: synaxis-app-secrets
  namespace: {{ .Values.namespace.name }}
  labels:
    app: synaxis-staging
    component: application
type: Opaque
stringData:
  JWT_SECRET: "{{ randAlphaNum 64 }}"
  JWT_ISSUER: "Synaxis-Staging"
  JWT_AUDIENCE: "Synaxis-Staging-API"
  EncryptionKey: "{{ randAlphaNum 64 }}"
  ApiKey: "{{ randAlphaNum 32 }}"
---
apiVersion: v1
kind: Secret
metadata:
  name: synaxis-grafana-credentials
  namespace: {{ .Values.namespace.name }}
  labels:
    app: synaxis-staging
    component: monitoring
type: Opaque
stringData:
  admin-user: "admin"
  admin-password: "{{ randAlphaNum 24 }}"
---
apiVersion: v1
kind: Secret
metadata:
  name: synaxis-azure-credentials
  namespace: {{ .Values.namespace.name }}
  labels:
    app: synaxis-staging
    component: cloud
type: Opaque
stringData:
  APPLICATIONINSIGHTS_CONNECTION_STRING: "{{ .Values.secrets.appInsightsConnectionString | default "InstrumentationKey=00000000-0000-0000-0000-000000000000" }}"
  AZURE_CLIENT_ID: "{{ .Values.secrets.azureClientId | default "" }}"
  AZURE_CLIENT_SECRET: "{{ .Values.secrets.azureClientSecret | default "" }}"
  AZURE_TENANT_ID: "{{ .Values.secrets.azureTenantId | default "" }}"
