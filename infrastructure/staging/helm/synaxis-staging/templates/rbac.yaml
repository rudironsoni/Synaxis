{{- /* Synaxis Service Account */ -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: synaxis-services
  namespace: {{ .Values.namespace.name }}
  labels:
    app: synaxis-staging
    component: services
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::{{ .Values.aws.accountId }}:role/synaxis-staging-service-role
---
# RBAC for service account
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: synaxis-services-role
  namespace: {{ .Values.namespace.name }}
rules:
- apiGroups: [""]
  resources: ["configmaps", "secrets"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: synaxis-services-binding
  namespace: {{ .Values.namespace.name }}
subjects:
- kind: ServiceAccount
  name: synaxis-services
  namespace: {{ .Values.namespace.name }}
roleRef:
  kind: Role
  name: synaxis-services-role
  apiGroup: rbac.authorization.k8s.io
