{{- /* Synaxis Istio Service Mesh Configuration */ -}}
{{- if .Values.istio.enabled }}
---
# PeerAuthentication for permissive mTLS (staging only)
apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: default
  namespace: {{ .Values.namespace.name }}
spec:
  mtls:
    mode: {{ .Values.global.istio.mtls.mode }}
---
# DestinationRule for mTLS
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: mtls-destination
  namespace: {{ .Values.namespace.name }}
spec:
  host: "*.{{ .Values.namespace.name }}.svc.cluster.local"
  trafficPolicy:
    tls:
      mode: ISTIO_MUTUAL
    connectionPool:
      tcp:
        maxConnections: 100
      http:
        http1MaxPendingRequests: 100
        http2MaxRequests: 1000
    loadBalancer:
      simple: LEAST_CONN
    outlierDetection:
      consecutive5xxErrors: 5
      interval: 30s
      baseEjectionTime: 30s
---
# VirtualService for Gateway
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: synaxis-gateway-routes
  namespace: {{ .Values.namespace.name }}
spec:
  hosts:
  - "{{ .Values.global.domain }}"
  - "*.{{ .Values.global.domain }}"
  gateways:
  - synaxis-gateway
  http:
  - match:
    - uri:
        prefix: /api/v1/identity
    route:
    - destination:
        host: identity
        port:
          number: 8080
    retries:
      attempts: 3
      perTryTimeout: 5s
      retryOn: 5xx,connect-failure,refused-stream
  - match:
    - uri:
        prefix: /api/v1/inference
    route:
    - destination:
        host: inference
        port:
          number: 8080
    retries:
      attempts: 3
      perTryTimeout: 30s
      retryOn: 5xx,connect-failure,refused-stream
  - match:
    - uri:
        prefix: /api/v1/billing
    route:
    - destination:
        host: billing
        port:
          number: 8080
    retries:
      attempts: 3
      perTryTimeout: 5s
      retryOn: 5xx,connect-failure,refused-stream
  - match:
    - uri:
        prefix: /api/v1/agents
    route:
    - destination:
        host: agents
        port:
          number: 8080
    retries:
      attempts: 3
      perTryTimeout: 10s
      retryOn: 5xx,connect-failure,refused-stream
  - match:
    - uri:
        prefix: /api/v1/orchestration
    route:
    - destination:
        host: orchestration
        port:
          number: 8080
    retries:
      attempts: 3
      perTryTimeout: 10s
      retryOn: 5xx,connect-failure,refused-stream
  - match:
    - uri:
        prefix: /health
    route:
    - destination:
        host: gateway
        port:
          number: 8080
  - match:
    - uri:
        prefix: /metrics
    route:
    - destination:
        host: prometheus
        port:
          number: 9090
---
# Gateway configuration
apiVersion: networking.istio.io/v1beta1
kind: Gateway
metadata:
  name: synaxis-gateway
  namespace: {{ .Values.namespace.name }}
spec:
  selector:
    istio: ingressgateway
  servers:
  - port:
      number: 443
      name: https
      protocol: HTTPS
    tls:
      mode: SIMPLE
      credentialName: synaxis-tls-cert
    hosts:
    - "{{ .Values.global.domain }}"
    - "*.{{ .Values.global.domain }}"
  - port:
      number: 80
      name: http
      protocol: HTTP
    hosts:
    - "{{ .Values.global.domain }}"
    - "*.{{ .Values.global.domain }}"
    tls:
      httpsRedirect: true
{{- end }}
