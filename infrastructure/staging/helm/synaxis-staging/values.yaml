# Synaxis Staging Environment Values
# This file contains the default configuration for the staging environment

global:
  environment: staging
  region: us-east-1
  domain: staging.synaxis.io
  image:
    registry: ghcr.io/rudironsoni
    tag: staging-latest
    pullPolicy: Always
  
  # Resource defaults for staging (scaled down from production)
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 2Gi

  # Service mesh configuration
  istio:
    enabled: true
    mtls:
      mode: PERMISSIVE  # Allow non-mTLS for staging flexibility
    
  # Observability
  observability:
    enabled: true
    samplingRate: 100  # Full tracing in staging

# Namespace configuration
namespace:
  name: synaxis-staging
  labels:
    environment: staging
    compliance: standard
    istio-injection: enabled

# Resource Quota for staging namespace
resourceQuota:
  enabled: true
  hard:
    requests.cpu: "10"
    requests.memory: 20Gi
    limits.cpu: "20"
    limits.memory: 40Gi
    persistentvolumeclaims: "20"
    services.loadbalancers: "2"
    pods: "50"

# Limit Range for pods
limitRange:
  enabled: true
  limits:
    - max:
        cpu: "2"
        memory: 4Gi
      min:
        cpu: 50m
        memory: 64Mi
      default:
        cpu: 500m
        memory: 1Gi
      defaultRequest:
        cpu: 250m
        memory: 512Mi
      type: Container

# PostgreSQL Configuration
postgresql:
  enabled: true
  architecture: standalone
  auth:
    existingSecret: synaxis-db-credentials
    database: synaxis_staging
  primary:
    persistence:
      enabled: true
      size: 20Gi
      storageClass: gp3
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: 2000m
        memory: 4Gi
    configuration: |-
      max_connections = 200
      shared_buffers = 512MB
      effective_cache_size = 1536MB
      maintenance_work_mem = 128MB
      checkpoint_completion_target = 0.9
      wal_buffers = 16MB
      default_statistics_target = 100
      random_page_cost = 1.1
      effective_io_concurrency = 200
      work_mem = 2621kB
      min_wal_size = 1GB
      max_wal_size = 4GB

# Redis Configuration
redis:
  enabled: true
  architecture: standalone
  auth:
    existingSecret: synaxis-redis-credentials
    existingSecretPasswordKey: redis-password
  master:
    persistence:
      enabled: true
      size: 8Gi
      storageClass: gp3
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 2Gi
  replica:
    replicaCount: 0  # No replicas in staging

# Prometheus Configuration
prometheus:
  enabled: true
  server:
    persistence:
      enabled: true
      size: 20Gi
      storageClass: gp3
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: 2000m
        memory: 4Gi
  alertmanager:
    enabled: true
    persistence:
      enabled: true
      size: 5Gi
    config:
      global:
        smtp_smarthost: 'smtp.gmail.com:587'
        smtp_from: 'alerts@synaxis.io'
      route:
        receiver: 'default'
        routes:
          - match:
              severity: critical
            receiver: 'pagerduty'
          - match:
              severity: warning
            receiver: 'slack'

# Grafana Configuration
grafana:
  enabled: true
  admin:
    existingSecret: synaxis-grafana-credentials
    existingSecretPasswordKey: admin-password
  persistence:
    enabled: true
    size: 10Gi
    storageClass: gp3
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  dashboards:
    default_home_dashboard_path: /var/lib/grafana/dashboards/synaxis-overview.json
  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
        - name: Prometheus
          type: prometheus
          url: http://synaxis-staging-prometheus-server:9090
          access: proxy
          isDefault: true
        - name: Loki
          type: loki
          url: http://synaxis-staging-loki:3100
          access: proxy
        - name: Tempo
          type: tempo
          url: http://synaxis-staging-tempo:3100
          access: proxy

# Loki Configuration
loki:
  enabled: true
  persistence:
    enabled: true
    size: 30Gi
    storageClass: gp3
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2000m
      memory: 4Gi

# Istio Service Mesh
istio:
  enabled: true
  profile: default
  meshConfig:
    defaultConfig:
      tracing:
        sampling: 100.0
        zipkin:
          address: synaxis-staging-jaeger-collector:9411
    enableAutoMtls: true

ingress:
  enabled: true
  controller:
    replicaCount: 2
    resources:
      requests:
        cpu: 500m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 1Gi
  service:
    type: LoadBalancer
    annotations:
      service.beta.kubernetes.io/aws-load-balancer-type: nlb
      service.beta.kubernetes.io/aws-load-balancer-scheme: internet-facing
      service.beta.kubernetes.io/aws-load-balancer-ssl-cert: "arn:aws:acm:us-east-1:ACCOUNT_ID:certificate/CERT_ID"
      service.beta.kubernetes.io/aws-load-balancer-ssl-ports: "443"
      service.beta.kubernetes.io/aws-load-balancer-backend-protocol: "http"

# Bounded Context Services Configuration
services:
  # API Gateway
  gateway:
    enabled: true
    replicaCount: 2
    image:
      repository: synaxis-gateway
      tag: staging-latest
    service:
      port: 8080
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 2Gi
    healthCheck:
      livenessPath: /health/liveness
      readinessPath: /health/readiness
    env:
      ASPNETCORE_ENVIRONMENT: Staging
      OTEL_EXPORTER_OTLP_ENDPOINT: http://synaxis-staging-otel-collector:4317
      
  # Identity Service
  identity:
    enabled: true
    replicaCount: 2
    image:
      repository: synaxis-identity
      tag: staging-latest
    service:
      port: 8080
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 2Gi
    healthCheck:
      livenessPath: /health/liveness
      readinessPath: /health/readiness
    env:
      ASPNETCORE_ENVIRONMENT: Staging
      
  # Inference Service
  inference:
    enabled: true
    replicaCount: 2
    image:
      repository: synaxis-inference
      tag: staging-latest
    service:
      port: 8080
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: 2000m
        memory: 4Gi
    healthCheck:
      livenessPath: /health/liveness
      readinessPath: /health/readiness
    env:
      ASPNETCORE_ENVIRONMENT: Staging
      
  # Billing Service
  billing:
    enabled: true
    replicaCount: 2
    image:
      repository: synaxis-billing
      tag: staging-latest
    service:
      port: 8080
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 2Gi
    healthCheck:
      livenessPath: /health/liveness
      readinessPath: /health/readiness
    env:
      ASPNETCORE_ENVIRONMENT: Staging
      
  # Agents Service
  agents:
    enabled: true
    replicaCount: 2
    image:
      repository: synaxis-agents
      tag: staging-latest
    service:
      port: 8080
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 2Gi
    healthCheck:
      livenessPath: /health/liveness
      readinessPath: /health/readiness
    env:
      ASPNETCORE_ENVIRONMENT: Staging
      
  # Orchestration Service
  orchestration:
    enabled: true
    replicaCount: 2
    image:
      repository: synaxis-orchestration
      tag: staging-latest
    service:
      port: 8080
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 2Gi
    healthCheck:
      livenessPath: /health/liveness
      readinessPath: /health/readiness
    env:
      ASPNETCORE_ENVIRONMENT: Staging

# Network Policies
networkPolicies:
  enabled: true
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: synaxis-staging
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              name: synaxis-staging
    - to:
        - namespaceSelector:
            matchLabels:
              name: kube-system
      ports:
        - protocol: UDP
          port: 53

# Autoscaling Configuration
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 10
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 15
        - type: Pods
          value: 4
          periodSeconds: 15
      selectPolicy: Max
