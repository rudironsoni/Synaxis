name: CI

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.vscode/**'
  pull_request:
    branches: [main, develop]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.vscode/**'
  workflow_dispatch:

env:
  DOTNET_VERSION: '10.0.x'
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  DOTNET_NOLOGO: 1
  NUGET_XMLDOC_MODE: skip
  # Container resource limits for Testcontainers
  TESTCONTAINERS_RYUK_DISABLED: true
  TESTCONTAINERS_DOCKER_SOCKET_OVERRIDE: /var/run/docker.sock

jobs:
  # Build and test job
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    services:
      # Docker-in-Docker for Testcontainers
      docker:
        image: docker:24-dind
        options: --privileged

    strategy:
      fail-fast: false
      matrix:
        test-category: [Unit, Integration]
        include:
          - test-category: Unit
            filter: 'Category=Unit'
            timeout: 10
          - test-category: Integration
            filter: 'Category=Integration'
            timeout: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          cache: true
          cache-dependency-path: '**/packages.lock.json'

      - name: Restore dependencies
        run: dotnet restore --locked-mode

      - name: Build solution
        run: dotnet build --configuration Release --no-restore

      - name: Run ${{ matrix.test-category }} Tests
        id: test
        timeout-minutes: ${{ matrix.timeout }}
        run: |
          dotnet test \
            --configuration Release \
            --no-build \
            --filter "${{ matrix.filter }}" \
            --settings coverlet.runsettings \
            --logger "trx;LogFileName=${{ matrix.test-category }}-TestResults.trx" \
            --logger "console;verbosity=detailed" \
            --blame-hang-timeout 5m \
            --blame-crash \
            --collect:"XPlat Code Coverage" \
            --results-directory ./TestResults \
            --diag ./TestResults/logs/${{ matrix.test-category }}-logs.txt
        continue-on-error: true

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ matrix.test-category }}
          path: |
            ./TestResults/**/*.trx
            ./TestResults/**/*.xml
            ./TestResults/logs/*.txt
          retention-days: 30

      - name: Publish Test Results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: ${{ matrix.test-category }} Tests
          path: ./TestResults/**/*.trx
          reporter: dotnet-trx
          fail-on-error: false
          list-tests: 'failed'

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        if: matrix.test-category == 'Unit'
        with:
          name: code-coverage
          path: ./TestResults/**/coverage.*
          retention-days: 30

      - name: Code Coverage Summary
        if: matrix.test-category == 'Unit' && always()
        run: |
          echo "## Code Coverage Summary" >> $GITHUB_STEP_SUMMARY
          for file in ./TestResults/**/coverage.cobertura.xml; do
            if [ -f "$file" ]; then
              line_rate=$(grep -oP 'line-rate="\K[^"]+' "$file" | head -1)
              branch_rate=$(grep -oP 'branch-rate="\K[^"]+' "$file" | head -1)
              line_pct=$(echo "$line_rate * 100" | bc -l | xargs printf "%.2f")
              branch_pct=$(echo "$branch_rate * 100" | bc -l | xargs printf "%.2f")
              echo "- Line Coverage: ${line_pct}%" >> $GITHUB_STEP_SUMMARY
              echo "- Branch Coverage: ${branch_pct}%" >> $GITHUB_STEP_SUMMARY
            fi
          done

      - name: Fail Build on Test Failure
        if: steps.test.outcome == 'failure'
        run: |
          echo "::error::Tests failed!"
          exit 1

  # Flaky test detection job
  flaky-test-detection:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: always() && github.event_name == 'pull_request'
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download All Test Results
        uses: actions/download-artifact@v4
        with:
          pattern: test-results-*
          path: ./TestResults
          merge-multiple: true

      - name: Analyze Test Results for Flaky Tests
        run: |
          echo "## Flaky Test Analysis" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Parse TRX files for flaky test patterns
          flaky_tests=""
          for trx in ./TestResults/**/*.trx; do
            if [ -f "$trx" ]; then
              # Check for tests that passed after retry or have inconsistent results
              # This is a simplified check - in production, you'd compare across multiple runs
              echo "Analyzing: $trx" >> $GITHUB_STEP_SUMMARY
            fi
          done

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "For detailed flaky test detection, run tests multiple times and compare results." >> $GITHUB_STEP_SUMMARY

  # Coverage report job
  coverage-report:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: always()
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Coverage Reports
        uses: actions/download-artifact@v4
        with:
          name: code-coverage
          path: ./coverage

      - name: Generate Coverage Report
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: coverage/**/coverage.cobertura.xml
          badge: true
          fail_below_min: false
          format: markdown
          hide_branch_rate: false
          hide_complexity: true
          indicators: true
          output: both
          thresholds: '60 80'

      - name: Add Coverage PR Comment
        uses: marocchino/sticky-pull-request-comment@v2
        if: github.event_name == 'pull_request'
        with:
          recreate: true
          path: code-coverage-results.md

  # Build verification job
  build-verification:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Pack
        run: dotnet pack --configuration Release --no-build --output ./packages

      - name: Upload Packages
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: ./packages/*.nupkg
          retention-days: 7

  # Static analysis job
  static-analysis:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore

      - name: Build with Analysis
        run: dotnet build --configuration Release --no-restore -p:TreatWarningsAsErrors=true
